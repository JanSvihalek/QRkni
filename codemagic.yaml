workflows:
  ios-adhoc:
    name: iOS Ad Hoc
    max_build_duration: 60
    integrations:
      app_store_connect: CodeMagic
    environment:
      flutter: stable
      vars:
        BUNDLE_ID: "com.jansvihalek.qrkni"
        XCODE_WORKSPACE: "ios/Runner.xcworkspace"
        XCODE_SCHEME: "Runner"
    scripts:
      - name: Set up signing
        script: |
          set -e
          keychain initialize

          echo "=== Generating private key ==="
          openssl genrsa -out /tmp/codemagic_cert_key.pem 2048

          echo "=== Creating distribution certificate ==="
          app-store-connect certificates create \
            --type IOS_DISTRIBUTION \
            --certificate-key=@file:/tmp/codemagic_cert_key.pem \
            --save

          echo "=== Fetching / creating Ad Hoc profile ==="
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_ADHOC \
            --certificate-key=@file:/tmp/codemagic_cert_key.pem \
            --create

          echo "=== Adding certificates to keychain ==="
          keychain add-certificates

          echo "=== Applying profiles to Xcode project ==="
          xcode-project use-profiles
      - name: Flutter pub get
        script: flutter pub get
      - name: Build iOS (no codesign)
        script: flutter build ios --release --no-codesign
      - name: Build IPA
        script: xcode-project build-ipa --workspace "$XCODE_WORKSPACE" --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      email:
        recipients:
          - jan.svihalek00@gmail.com
        notify:
          success: true
          failure: true
